<!--
  Pixel-art owl perched at the top-right of the latest post card.
  Idle: blinks, wings flutter, head tilts. Periodically: flies a loop and returns.
-->
<div class="owl-mascot" aria-hidden="true">
  <div class="owl">
    <!-- Ear tufts -->
    <div class="owl-tuft owl-tuft-l"></div>
    <div class="owl-tuft owl-tuft-r"></div>

    <!-- Head + face -->
    <div class="owl-head">
      <!-- Eye masks (the white facial-disc pair) -->
      <div class="owl-mask owl-mask-l"></div>
      <div class="owl-mask owl-mask-r"></div>
      <!-- Eyes (pupils inside masks) -->
      <div class="owl-eye owl-eye-l"></div>
      <div class="owl-eye owl-eye-r"></div>
      <!-- Beak -->
      <div class="owl-beak"></div>
    </div>

    <!-- Body -->
    <div class="owl-body">
      <div class="owl-belly"></div>
    </div>

    <!-- Wings -->
    <div class="owl-wing owl-wing-l"></div>
    <div class="owl-wing owl-wing-r"></div>

    <!-- Feet on the perch -->
    <div class="owl-feet">
      <div class="owl-foot owl-foot-l"></div>
      <div class="owl-foot owl-foot-r"></div>
    </div>
  </div>
</div>
